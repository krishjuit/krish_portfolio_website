<!DOCTYPE html>
<html>
    <head>
        <title>Weather App</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="card">
            <div class="search">
                <input type="text" placeholder="enter city name" spellcheck="false">
                <button><img src="search.png"></button>
            </div>
            <div class="error">Invalid city Name</div>
            <div class="weather">
                <img src="rain.png" class="weather-icon">
                <h1 class="temp">22°C</h1>
                <h2 class="city">New York</h2>
                <p id="mock-badge" style="display:none; color: rgba(255,255,255,0.6); font-size: 11px; margin-top: -5px; margin-bottom: 12px; font-weight: 500; font-family: sans-serif; letter-spacing: 0.5px;">⚡ Simulated Offline Weather</p>
                <div class="details">
                    <div class="col">
                        <img src="humidity.png">
                        <div>
                            <p class="humidity">50%</p>
                            <p>humidity</p>
                        </div>
                    </div>
                    <div class="col">
                        <img src="wind.png">
                        <div>
                            <p class="wind">15km/h</p>
                            <p>Wind Speed</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const apiKey="689c67978e5a3e85b172876990c4ca11";
            const apiUrl="https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

            const searchBox=document.querySelector(".search input");
            const searchbtn=document.querySelector(".search button");
            const weatherIcon=document.querySelector(".weather-icon");
            const errorDiv=document.querySelector(".error");
            const weatherDiv=document.querySelector(".weather");
            const mockBadge=document.getElementById("mock-badge");

            // Mock generator to ensure reliability in reviews/interviews
            function getMockWeather(city) {
                let hash = 0;
                for (let i = 0; i < city.length; i++) {
                    hash = city.charCodeAt(i) + ((hash << 5) - hash);
                }
                
                const conditions = ["Clear", "Clouds", "Rain", "Drizzle", "Mist", "Snow"];
                const weatherMain = conditions[Math.abs(hash) % conditions.length];
                
                // Deterministic properties
                const temp = (Math.abs(hash) % 36) + 4; // 4 to 40 deg C
                const humidity = (Math.abs(hash) % 50) + 45; // 45 to 95%
                const windSpeed = ((Math.abs(hash) % 28) + 3).toFixed(1); // 3 to 31 km/h

                return {
                    name: city.charAt(0).toUpperCase() + city.slice(1),
                    main: {
                        temp: temp,
                        humidity: humidity
                    },
                    wind: {
                        speed: windSpeed
                    },
                    weather: [{
                        main: weatherMain
                    }],
                    isMock: true
                };
            }

            function loadWeatherData(data) {
                document.querySelector(".city").innerHTML = data.name;
                document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + `°C`;
                document.querySelector(".humidity").innerHTML = data.main.humidity + `%`;
                document.querySelector(".wind").innerHTML = data.wind.speed + `km/h`;

                const condition = data.weather[0].main;
                if(condition === "Clouds"){
                    weatherIcon.src = "clouds.png";
                }
                else if(condition === 'Clear'){
                    weatherIcon.src = "clear.png";
                }
                else if(condition === 'Rain'){
                    weatherIcon.src = "rain.png";
                }
                else if(condition === 'Drizzle'){
                    weatherIcon.src = "drizzle.png";
                }
                else if(condition === 'Mist'){
                    weatherIcon.src = "mist.png";
                }
                else if(condition === 'Snow'){
                    weatherIcon.src = "snow.png";
                } else {
                    weatherIcon.src = "clouds.png";
                }
                
                if (data.isMock) {
                    mockBadge.style.display = "block";
                } else {
                    mockBadge.style.display = "none";
                }

                weatherDiv.style.display = "block";
                errorDiv.style.display = "none";
            }

            async function checkWeather(city){
                if (!city || city.trim() === "") return;
                
                try {
                    const response = await fetch(apiUrl + encodeURIComponent(city) + `&appid=${apiKey}`);
                    if(response.status == 404){
                        errorDiv.style.display = "block";
                        weatherDiv.style.display = "none";
                        mockBadge.style.display = "none";
                        return;
                    }
                    
                    if (response.status !== 200) {
                        console.warn("API request failed with code " + response.status + ". Using simulation fallback.");
                        loadWeatherData(getMockWeather(city));
                        return;
                    }
                    
                    var data = await response.json();
                    loadWeatherData(data);
                } catch (error) {
                    console.warn("Network error. Using simulation fallback.", error);
                    loadWeatherData(getMockWeather(city));
                }
            }

            searchbtn.addEventListener("click", () => {
                checkWeather(searchBox.value);
            });

            searchBox.addEventListener("keydown", (event) => {
                if(event.key === "Enter") {
                    checkWeather(searchBox.value);
                }
            });

            window.onload = function(){
                searchBox.value = "";
            }
        </script>
    </body>
</html>
