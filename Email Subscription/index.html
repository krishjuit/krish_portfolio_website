<!DOCTYPE html>
<html>
    <head>
        <title>
            Email Subscription
        </title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="hero">
            <h3>Coming Soon!</h3>
            <h1>OurBrand New<br> Website Is on It's Way</h1>
            <p>Subscribe for more details</p>
            <form name="submit-to-google-sheet">
                <input type="email" name="Email" placeholder="Your Email id" required>
                <button type="submit"><img src="send-icon.png" width="30px"></button>
            </form>
            <span id="msg"></span>
        </div>
        <script>
  const scriptURL = 'https://script.google.com/macros/s/AKfycbyv_RlW_7d4bIPnL31bTmwMVSK6N4jT42i4sVhzG3PLAkMwdthkmsWZNXzGN_pP1tR8/exec'
  const form = document.forms['submit-to-google-sheet']
const msg=document.getElementById("msg");
  form.addEventListener('submit', e => {
    e.preventDefault()
    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(response => {
        msg.innerHTML="Thanks for Subscribing";
        setTimeout(function(){
            msg.innerHTML="";
        },5000)
        form.reset();
      })
      .catch(error => console.error('Error!', error.message))
  })
</script>
    </body>
</html>
